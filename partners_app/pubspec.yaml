name: meat_partners
description: "Go'sht Bozori Partners — Qassob + Yetkazib beruvchi mobile app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Shared cross-app code (ApiClient, models, theme, locale, auth bridge)
  shared_core:
    path: ../packages/shared_core
  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.4.1

  # Network + persistence
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Firebase — push notifications only. v3.9.16 removed firebase_auth (phone SMS); partners now log in
  # with an admin-issued phone + password. firebase_core stays because firebase_messaging needs it.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Location + maps + media
  geolocator: ^13.0.1
  image_picker: ^1.1.2

  # Charts (F3 earnings)
  fl_chart: ^0.69.0

  # Calendar (F8 qassob capacity)
  table_calendar: ^3.1.2

  # External links — Telegram (F9), Maps
  url_launcher: ^6.3.1

  # PIN code input for OTP
  pin_code_fields: ^8.0.1

  # JSON model codegen
  json_annotation: ^4.9.0
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
