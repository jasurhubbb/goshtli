name: CI

# Run on every push to main + every PR. Cancels older runs of the same ref so a quick succession of pushes only finishes the latest.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  # ------------------------------ BACKEND ------------------------------
  backend:
    name: Backend (Django + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Postgres service container — pytest-django connects to it via the env vars below
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: meat_marketplace
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Healthcheck so the test step doesn't start until Postgres is accepting connections
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system checks
        env:
          DEBUG: "True"
          SECRET_KEY: ci-only-secret-do-not-use
          DB_NAME: meat_marketplace
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py check --deploy --fail-level WARNING || python manage.py check

      - name: Validate OpenAPI schema
        env:
          DEBUG: "True"
          SECRET_KEY: ci-only-secret
          DB_NAME: meat_marketplace
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: python manage.py spectacular --validate --file /tmp/openapi.yaml

      - name: pytest
        env:
          DEBUG: "True"
          SECRET_KEY: ci-only-secret
          DB_NAME: meat_marketplace
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
        run: pytest -ra --tb=short

      - name: Backend Docker build (production image)
        # Verifies the multi-stage Dockerfile works on CI, not just on Mac
        run: docker build -t meat-backend:ci .


  # ------------------------------ MOBILE ------------------------------
  mobile:
    name: Mobile (Flutter analyze + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Generate JSON serialization + l10n
        run: |
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Web build (release)
        # Verifies the production web build still compiles
        run: flutter build web --release --no-pub
