version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: meat_marketplace_postgres
    restart: always
    environment:
      POSTGRES_DB: meat_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: meat_marketplace_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

volumes:
  postgres_data:
