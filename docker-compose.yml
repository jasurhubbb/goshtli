services:
  postgres:
    image: postgres:16
    container_name: meat_marketplace_postgres
    restart: always
    environment:
      POSTGRES_DB: meat_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis — Celery broker + result backend; later doubles as the cache-aside layer for the catalog feed.
  # Persistence is on so a container restart doesn't lose in-flight tasks; volume keeps RDB snapshots between restarts.
  redis:
    image: redis:7-alpine
    container_name: meat_marketplace_redis
    restart: always
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: meat_marketplace_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  # Celery worker — picks up tasks from Redis (image resize, future cache warming + reports).
  # Shares the backend image so the codebase is identical; just runs a different command. Concurrency=2 is plenty
  # for image work on a small box; raise it when you start running daily cron-like aggregations.
  worker:
    build:
      context: ./backend
    container_name: meat_marketplace_worker
    command: celery -A config worker -l info --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
